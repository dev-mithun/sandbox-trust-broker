management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics

logging:
  level:
    root: INFO
    com.mit.sandbox: DEBUG

identity:
  providers:
    mock-idp:
      jwksUrl: http://localhost:8080/api/v1/mock/jwks.json
      jwksCacheTtlSeconds: 300
      allowedAudiences:
        - sandbox-trust-broker
        - sandbox-gateway
      mapping:
        subject: sub
        givenName: given_name
        familyName: family_name

sandbox:
  issuer: sandbox-gateway
  audience: sandbox-app
  token-expiration-seconds: 3600
  private-key-path: keys/sandbox-private.pem
  public-key-path: keys/sandbox-public.pem
  key-id: sandbox-key-1